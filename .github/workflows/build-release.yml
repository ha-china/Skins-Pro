name: Build and Release Skins Pro

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate skin list
        run: node scripts/build-skins.cjs

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npx rollup -c

      - name: Commit dist assets
        if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add dist/skins-pro.js dist/default
          git diff --staged --quiet || git commit -m "chore: build dist assets [skip ci]"
          git push

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          body: |
            # Skins Pro ${{ github.ref_name }}

            ## Installation via HACS
            1. Open HACS → Frontend → Custom repositories
            2. Add: `https://github.com/Desmond-Dong/Skins-Pro`
            3. Category: **Dashboard**
            4. Search for "Skins Pro" and install
            5. Clear browser cache and restart Home Assistant
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
